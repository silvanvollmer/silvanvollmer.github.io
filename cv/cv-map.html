<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Map</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }

       .map-wrap {
      position: relative;
      width: 100%;
      max-width: 320px;
      margin: 0;
    }

    .map-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    }

    .tooltip {
      position: absolute;
      left: 50%;
      bottom: 150%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.88);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .dot:hover .tooltip {
      opacity: 1;
    }

    /* placeholder positions */
    .freiburg   { left: 43%; top: 63%; }
    .koeln      { left: 41%; top: 57%; }
    .zurich     { left: 45%; top: 66%; }
    .copenhagen { left: 47%; top: 46%; }
  </style>
</head>
<body>
  <div class="map-wrap">
    <img src="europe.svg" alt="Europe map" />

    <div class="dot freiburg">
      <span class="tooltip">Freiburg — add text</span>
    </div>

    <div class="dot koeln">
      <span class="tooltip">Köln — add text</span>
    </div>

    <div class="dot zurich">
      <span class="tooltip">Zürich — add text</span>
    </div>

    <div class="dot copenhagen">
      <span class="tooltip">København — add text</span>
    </div>
  </div>
</body>
</html>
